<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MendiVan CRM</title>
<style>
  :root {
    --primary: #195d6a;
    --accent: #539c88;
    --bg: #f0f4ed;
    --highlight: #feab70;
    --alert: #9f4128;
    --white: #ffffff;
    --gray-100: #f7f9f7;
    --gray-200: #e8ede8;
    --gray-300: #d0d8d0;
    --gray-400: #9aaa9a;
    --gray-500: #6a7a6a;
    --gray-700: #3a4a3a;
    --text: #1a2a1a;
    --shadow: 0 1px 3px rgba(0,0,0,0.10), 0 1px 2px rgba(0,0,0,0.06);
    --shadow-md: 0 4px 6px rgba(0,0,0,0.08), 0 2px 4px rgba(0,0,0,0.06);
    --radius: 8px;
    --radius-lg: 12px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: var(--bg);
    color: var(--text);
    font-size: 14px;
    line-height: 1.5;
  }

  /* NAV */
  #nav {
    position: fixed; top: 0; left: 0; right: 0; z-index: 100;
    background: var(--primary);
    display: flex; align-items: center;
    height: 52px; padding: 0 16px;
    box-shadow: 0 2px 8px rgba(0,0,0,0.2);
  }

  .nav-brand {
    font-weight: 700; font-size: 16px; color: white;
    margin-right: 24px; letter-spacing: -0.3px;
  }

  .nav-tabs { display: flex; gap: 4px; flex: 1; }

  .nav-tab {
    padding: 6px 14px; border-radius: 6px; cursor: pointer;
    color: rgba(255,255,255,0.7); font-size: 13px; font-weight: 500;
    transition: all 0.15s; user-select: none;
    border: none; background: transparent;
  }
  .nav-tab:hover { background: rgba(255,255,255,0.1); color: white; }
  .nav-tab.active { background: rgba(255,255,255,0.2); color: white; }
  .nav-tab.disabled { cursor: default; opacity: 0.45; pointer-events: none; }

  .nav-right { display: flex; align-items: center; gap: 12px; }

  #save-indicator {
    font-size: 12px; color: rgba(255,255,255,0.7);
    min-width: 90px; text-align: right;
  }
  #save-indicator.saving { color: var(--highlight); }
  #save-indicator.saved { color: #8bc89a; }
  #save-indicator.error { color: #f08080; }

  .btn-icon {
    background: rgba(255,255,255,0.15); border: none; color: white;
    width: 32px; height: 32px; border-radius: 6px; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    font-size: 16px; transition: background 0.15s;
  }
  .btn-icon:hover { background: rgba(255,255,255,0.25); }

  /* MAIN */
  #main { margin-top: 52px; padding: 20px; max-width: 1200px; margin-left: auto; margin-right: auto; }

  /* VIEWS */
  .view { display: none; }
  .view.active { display: block; }

  /* BUTTONS */
  .btn {
    display: inline-flex; align-items: center; gap: 6px;
    padding: 8px 16px; border-radius: 6px; border: none;
    font-size: 13px; font-weight: 500; cursor: pointer;
    transition: all 0.15s; text-decoration: none;
  }
  .btn-primary { background: var(--primary); color: white; }
  .btn-primary:hover { background: #1a6878; }
  .btn-accent { background: var(--accent); color: white; }
  .btn-accent:hover { background: #478a76; }
  .btn-ghost { background: transparent; color: var(--gray-500); border: 1px solid var(--gray-300); }
  .btn-ghost:hover { background: var(--gray-200); color: var(--gray-700); }
  .btn-danger { background: var(--alert); color: white; }
  .btn-danger:hover { background: #8a3520; }
  .btn-sm { padding: 5px 10px; font-size: 12px; }

  /* CARDS */
  .card {
    background: white; border-radius: var(--radius-lg);
    box-shadow: var(--shadow); padding: 16px;
    border: 1px solid var(--gray-200);
  }

  /* BADGES */
  .badge {
    display: inline-block; padding: 2px 8px; border-radius: 12px;
    font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px;
  }
  .badge-green { background: #d1f0e0; color: #1a6a3a; }
  .badge-orange { background: #fde8d0; color: #a04010; }
  .badge-blue { background: #d0e8f5; color: #1050a0; }
  .badge-gray { background: var(--gray-200); color: var(--gray-500); }
  .badge-red { background: #fde0d8; color: var(--alert); }
  .badge-purple { background: #ead5f0; color: #6030a0; }

  /* PIPELINE BADGES */
  .pipeline-nuevo { background: #d0e8f5; color: #1050a0; }
  .pipeline-contactado { background: #d5ecd8; color: #2a7030; }
  .pipeline-buscando { background: #e8d8f0; color: #602090; }
  .pipeline-negociando { background: #fde8d0; color: #a04010; }
  .pipeline-contratado { background: #fef4d0; color: #8a5010; }
  .pipeline-entregado { background: #d1f0e0; color: #1a6a3a; }
  .pipeline-perdido { background: #fde0d8; color: var(--alert); }

  /* FORMS */
  .form-group { margin-bottom: 14px; }
  .form-label {
    display: block; font-size: 12px; font-weight: 600;
    color: var(--gray-500); margin-bottom: 4px; text-transform: uppercase; letter-spacing: 0.5px;
  }
  .form-control {
    width: 100%; padding: 8px 10px; border: 1px solid var(--gray-300);
    border-radius: 6px; font-size: 13px; background: white; color: var(--text);
    transition: border-color 0.15s;
  }
  .form-control:focus { outline: none; border-color: var(--accent); }
  .form-control:disabled { background: var(--gray-100); color: var(--gray-500); cursor: default; }
  select.form-control { cursor: pointer; }
  textarea.form-control { resize: vertical; min-height: 80px; }

  .form-row { display: grid; grid-template-columns: repeat(auto-fit, minmax(160px, 1fr)); gap: 12px; }

  /* SECTION HEADERS */
  .section-header {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 16px;
  }
  .section-title { font-size: 18px; font-weight: 700; color: var(--primary); }

  /* CLIENTE LIST */
  #search-bar {
    display: flex; gap: 10px; margin-bottom: 16px; align-items: center;
  }
  #search-input {
    flex: 1; padding: 8px 12px; border: 1px solid var(--gray-300);
    border-radius: 6px; font-size: 13px; background: white;
  }
  #search-input:focus { outline: none; border-color: var(--accent); }

  .clientes-grid { display: grid; gap: 12px; }

  .cliente-card {
    background: white; border-radius: var(--radius-lg);
    border: 1px solid var(--gray-200); padding: 14px 16px;
    box-shadow: var(--shadow); cursor: pointer;
    transition: all 0.15s; display: grid;
    grid-template-columns: 1fr auto;
    gap: 8px; align-items: start;
  }
  .cliente-card:hover { border-color: var(--accent); box-shadow: var(--shadow-md); }
  .cliente-card.stale { border-left: 3px solid var(--highlight); }

  .cliente-name { font-weight: 700; font-size: 15px; color: var(--primary); }
  .cliente-meta { font-size: 12px; color: var(--gray-500); margin-top: 2px; }
  .cliente-meta span { margin-right: 12px; }
  .cliente-actions { display: flex; align-items: center; gap: 8px; }
  .stale-badge { font-size: 11px; color: var(--highlight); font-weight: 600; }

  /* FICHA CLIENTE */
  #ficha-cliente-view .back-btn {
    display: flex; align-items: center; gap: 6px;
    color: var(--gray-500); cursor: pointer; font-size: 13px;
    margin-bottom: 16px; width: fit-content;
  }
  #ficha-cliente-view .back-btn:hover { color: var(--primary); }

  .ficha-header {
    display: flex; align-items: flex-start; justify-content: space-between;
    margin-bottom: 20px; flex-wrap: wrap; gap: 12px;
  }
  .ficha-title { font-size: 22px; font-weight: 800; color: var(--primary); }

  .tabs-inner { display: flex; gap: 4px; margin-bottom: 20px; border-bottom: 1px solid var(--gray-200); }
  .tab-inner {
    padding: 8px 16px; cursor: pointer; font-size: 13px; font-weight: 500;
    color: var(--gray-500); border-bottom: 2px solid transparent; margin-bottom: -1px;
    transition: all 0.15s;
  }
  .tab-inner:hover { color: var(--primary); }
  .tab-inner.active { color: var(--primary); border-bottom-color: var(--primary); font-weight: 600; }

  .vehiculos-list { display: grid; gap: 10px; }
  .vehiculo-row {
    background: white; border: 1px solid var(--gray-200); border-radius: var(--radius);
    padding: 12px 14px; display: flex; align-items: center;
    justify-content: space-between; cursor: pointer; transition: all 0.15s;
  }
  .vehiculo-row:hover { border-color: var(--accent); }
  .vehiculo-row.descartado { opacity: 0.55; }
  .vehiculo-row.seleccionado { border-left: 3px solid var(--accent); }
  .vehiculo-info { flex: 1; }
  .vehiculo-name { font-weight: 600; font-size: 14px; }
  .vehiculo-meta { font-size: 12px; color: var(--gray-500); margin-top: 2px; }

  .notas-list { display: flex; flex-direction: column; gap: 10px; }
  .nota-item {
    background: var(--gray-100); border-radius: var(--radius);
    padding: 10px 12px; font-size: 13px; border-left: 3px solid var(--accent);
  }
  .nota-date { font-size: 11px; color: var(--gray-400); margin-bottom: 4px; }
  .nota-add { display: flex; gap: 8px; margin-bottom: 16px; }
  .nota-add textarea { flex: 1; }

  /* FICHA VEHICULO */
  #ficha-vehiculo-view .back-btn {
    display: flex; align-items: center; gap: 6px;
    color: var(--gray-500); cursor: pointer; font-size: 13px;
    margin-bottom: 16px; width: fit-content;
  }
  #ficha-vehiculo-view .back-btn:hover { color: var(--primary); }

  .vehiculo-grid {
    display: grid; grid-template-columns: 1fr 380px; gap: 20px; align-items: start;
  }
  @media (max-width: 900px) {
    .vehiculo-grid { grid-template-columns: 1fr; }
  }

  .fase-block {
    border: 1px solid var(--gray-200); border-radius: var(--radius);
    overflow: hidden; margin-bottom: 12px;
  }
  .fase-header {
    padding: 10px 14px; background: var(--gray-100);
    display: flex; align-items: center; justify-content: space-between;
    cursor: pointer; user-select: none;
  }
  .fase-header:hover { background: var(--gray-200); }
  .fase-title { font-weight: 700; font-size: 13px; color: var(--primary); }
  .fase-progress { font-size: 12px; color: var(--gray-500); }
  .fase-body { padding: 12px 14px; display: none; }
  .fase-body.open { display: block; }

  .tarea-item {
    display: flex; align-items: flex-start; gap: 8px;
    padding: 6px 0; border-bottom: 1px solid var(--gray-100);
  }
  .tarea-item:last-child { border-bottom: none; }
  .tarea-check {
    width: 16px; height: 16px; border-radius: 3px;
    border: 2px solid var(--gray-300); cursor: pointer;
    flex-shrink: 0; margin-top: 1px;
    appearance: none; -webkit-appearance: none;
    background: white; transition: all 0.15s;
  }
  .tarea-check:checked {
    background: var(--accent); border-color: var(--accent);
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 16 16' fill='white' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M13.3 4.3l-6.3 6.3-2.3-2.3-1.4 1.4 3.7 3.7 7.7-7.7z'/%3E%3C/svg%3E");
  }
  .tarea-label { font-size: 13px; line-height: 1.4; cursor: pointer; }
  .tarea-label.done { text-decoration: line-through; color: var(--gray-400); }

  /* ALERTAS */
  .alertas-panel { margin-bottom: 16px; }
  .alerta-item {
    display: flex; align-items: flex-start; gap: 8px;
    background: #fef3ed; border: 1px solid #fcd8b8;
    border-radius: var(--radius); padding: 10px 12px; margin-bottom: 8px;
    font-size: 13px; color: #7a3010;
  }
  .alerta-item.danger { background: #fde8e4; border-color: #f4b8b0; color: var(--alert); }
  .alerta-icon { font-size: 15px; flex-shrink: 0; }

  /* CHAT IA */
  .chat-panel {
    background: white; border: 1px solid var(--gray-200);
    border-radius: var(--radius-lg); display: flex; flex-direction: column;
    height: 600px;
  }
  .chat-header {
    padding: 12px 16px; border-bottom: 1px solid var(--gray-200);
    display: flex; align-items: center; gap: 8px;
  }
  .chat-header-title { font-weight: 700; color: var(--primary); font-size: 14px; }
  .chat-ai-dot {
    width: 8px; height: 8px; border-radius: 50%; background: var(--accent);
  }
  .chat-messages {
    flex: 1; overflow-y: auto; padding: 12px;
    display: flex; flex-direction: column; gap: 10px;
  }
  .msg {
    max-width: 88%; padding: 8px 12px;
    border-radius: 10px; font-size: 13px; line-height: 1.5;
  }
  .msg-user {
    background: var(--primary); color: white;
    align-self: flex-end; border-bottom-right-radius: 3px;
  }
  .msg-ai {
    background: var(--gray-100); color: var(--text);
    align-self: flex-start; border-bottom-left-radius: 3px;
  }
  .msg-ai pre { white-space: pre-wrap; font-family: inherit; }
  .msg-system {
    background: #fef3ed; color: #7a3010;
    align-self: center; font-size: 12px; text-align: center;
    border: 1px solid #fcd8b8;
  }
  .chat-thinking { opacity: 0.6; font-style: italic; }

  .chat-toolbar {
    padding: 8px 12px; border-top: 1px solid var(--gray-100);
  }
  .btn-analizar {
    width: 100%; background: #fef3ed; border: 1px solid #fcd8b8;
    color: #7a3010; padding: 7px; border-radius: 6px; cursor: pointer;
    font-size: 12px; font-weight: 500; transition: all 0.15s;
  }
  .btn-analizar:hover { background: #fde8d0; }

  .chat-input-row {
    display: flex; gap: 8px; padding: 10px 12px;
    border-top: 1px solid var(--gray-200);
  }
  .chat-input {
    flex: 1; padding: 8px 10px; border: 1px solid var(--gray-300);
    border-radius: 6px; font-size: 13px; resize: none; height: 60px;
  }
  .chat-input:focus { outline: none; border-color: var(--accent); }
  .btn-send {
    background: var(--primary); color: white; border: none;
    border-radius: 6px; padding: 0 14px; cursor: pointer;
    font-size: 18px; transition: background 0.15s;
    align-self: flex-end; height: 36px;
  }
  .btn-send:hover { background: #1a6878; }
  .btn-send:disabled { opacity: 0.5; cursor: default; }

  /* MODAL */
  .modal-overlay {
    position: fixed; inset: 0; background: rgba(0,0,0,0.45);
    z-index: 200; display: flex; align-items: center; justify-content: center;
    padding: 20px;
  }
  .modal {
    background: white; border-radius: var(--radius-lg);
    padding: 24px; max-width: 560px; width: 100%;
    box-shadow: 0 20px 60px rgba(0,0,0,0.2);
    max-height: 90vh; overflow-y: auto;
  }
  .modal-title { font-size: 18px; font-weight: 700; color: var(--primary); margin-bottom: 20px; }
  .modal-footer { display: flex; gap: 10px; justify-content: flex-end; margin-top: 20px; }

  /* TOAST */
  #toast-container {
    position: fixed; bottom: 20px; right: 20px; z-index: 300;
    display: flex; flex-direction: column; gap: 8px;
  }
  .toast {
    background: var(--gray-700); color: white; padding: 10px 16px;
    border-radius: 8px; font-size: 13px; box-shadow: var(--shadow-md);
    animation: slideIn 0.2s ease;
  }
  .toast.success { background: var(--accent); }
  .toast.error { background: var(--alert); }
  .toast.warning { background: #c07030; }
  @keyframes slideIn { from { transform: translateX(40px); opacity: 0; } to { transform: translateX(0); opacity: 1; } }

  /* CONFIG */
  .config-section { margin-bottom: 24px; }
  .config-section h3 { font-size: 14px; font-weight: 700; color: var(--primary); margin-bottom: 12px; border-bottom: 1px solid var(--gray-200); padding-bottom: 6px; }

  /* EMPTY STATE */
  .empty-state {
    text-align: center; padding: 60px 20px; color: var(--gray-400);
  }
  .empty-state .icon { font-size: 48px; margin-bottom: 12px; }
  .empty-state p { font-size: 14px; }

  /* FASE SELECTOR */
  .fase-selector {
    display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 16px;
  }
  .fase-btn {
    padding: 5px 12px; border-radius: 20px; font-size: 12px; font-weight: 600;
    border: 2px solid var(--gray-300); background: white; cursor: pointer;
    color: var(--gray-500); transition: all 0.15s;
  }
  .fase-btn.active {
    border-color: var(--primary); background: var(--primary); color: white;
  }
  .fase-btn.completed { border-color: var(--accent); color: var(--accent); }

  /* LINK */
  a.link-ext {
    color: var(--accent); text-decoration: none; font-size: 12px;
  }
  a.link-ext:hover { text-decoration: underline; }

  /* SCROLL */
  ::-webkit-scrollbar { width: 6px; height: 6px; }
  ::-webkit-scrollbar-track { background: var(--gray-100); }
  ::-webkit-scrollbar-thumb { background: var(--gray-300); border-radius: 3px; }
  ::-webkit-scrollbar-thumb:hover { background: var(--gray-400); }

  /* SETUP SCREEN */
  #setup-screen {
    position: fixed; inset: 0; background: var(--bg);
    z-index: 1000; display: flex; align-items: center; justify-content: center;
    padding: 20px;
  }
  .setup-card {
    background: white; border-radius: var(--radius-lg); padding: 36px 40px;
    max-width: 480px; width: 100%; box-shadow: var(--shadow-md);
    border: 1px solid var(--gray-200);
  }
  .setup-logo { font-size: 28px; font-weight: 800; color: var(--primary); margin-bottom: 6px; }
  .setup-sub { color: var(--gray-500); font-size: 14px; margin-bottom: 28px; }
  .setup-note { font-size: 12px; color: var(--gray-400); margin-top: 6px; }

  /* INLINE EDIT */
  .inline-edit {
    display: inline-block; border: 1px solid transparent; border-radius: 4px;
    padding: 2px 6px; cursor: text; min-width: 60px;
    transition: border-color 0.15s;
  }
  .inline-edit:hover { border-color: var(--gray-300); background: var(--gray-100); }
  .inline-edit:focus { outline: none; border-color: var(--accent); background: white; }

  /* LOADING */
  .loading-dots::after {
    content: '...';
    animation: dots 1.2s steps(4, end) infinite;
  }
  @keyframes dots {
    0%, 20% { content: '.'; }
    40% { content: '..'; }
    60%, 100% { content: '...'; }
  }

  /* FASE CURRENT INDICATOR */
  .fase-actual-badge {
    display: inline-block; background: var(--primary); color: white;
    font-size: 11px; font-weight: 700; padding: 2px 8px; border-radius: 12px;
    margin-left: 8px;
  }

  /* TRANSPORT SELECTOR */
  .transport-option {
    display: flex; align-items: center; gap: 8px; padding: 10px 12px;
    border: 1px solid var(--gray-300); border-radius: var(--radius); cursor: pointer;
    transition: all 0.15s; margin-bottom: 8px;
  }
  .transport-option:has(input:checked) { border-color: var(--accent); background: #f0faf6; }

  .mini-section { margin-bottom: 20px; }
  .mini-section-title { font-size: 13px; font-weight: 700; color: var(--gray-700); margin-bottom: 10px; text-transform: uppercase; letter-spacing: 0.5px; }

  /* ===== INVENTARIO ===== */
  .inv-filters { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 16px; align-items: center; }
  .inv-filter-group { display: flex; gap: 4px; }
  .filter-btn {
    padding: 5px 12px; border-radius: 20px; font-size: 12px; font-weight: 500;
    border: 1px solid var(--gray-300); background: white; cursor: pointer;
    color: var(--gray-500); transition: all 0.15s;
  }
  .filter-btn:hover { border-color: var(--accent); color: var(--accent); }
  .filter-btn.active { background: var(--primary); border-color: var(--primary); color: white; }
  .filter-sep { width: 1px; height: 24px; background: var(--gray-300); margin: 0 4px; }

  .inv-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 16px; }
  .inv-card {
    background: white; border-radius: var(--radius-lg);
    border: 1px solid var(--gray-200); box-shadow: var(--shadow);
    cursor: pointer; transition: all 0.15s; overflow: hidden;
  }
  .inv-card:hover { border-color: var(--accent); box-shadow: var(--shadow-md); transform: translateY(-1px); }
  .inv-card-photo {
    width: 100%; height: 180px; background: var(--gray-200);
    display: flex; align-items: center; justify-content: center;
    font-size: 40px; color: var(--gray-400); overflow: hidden;
  }
  .inv-card-photo img { width: 100%; height: 100%; object-fit: cover; }
  .inv-card-body { padding: 12px 14px; }
  .inv-card-title { font-weight: 700; font-size: 15px; color: var(--primary); margin-bottom: 4px; }
  .inv-card-meta { font-size: 12px; color: var(--gray-500); margin-bottom: 8px; }
  .inv-card-badges { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 8px; }
  .inv-card-prices { display: flex; gap: 16px; align-items: baseline; }
  .inv-price-label { font-size: 11px; color: var(--gray-400); text-transform: uppercase; letter-spacing: 0.4px; }
  .inv-price-de { font-size: 13px; color: var(--gray-500); }
  .inv-price-es { font-size: 16px; font-weight: 700; color: var(--primary); }

  .badge-categoria { background: #fde8cc; color: #7a4010; }
  .badge-de { background: #195d6a; color: white; }
  .badge-es { background: #539c88; color: white; }
  .badge-disponible { background: #d1f0e0; color: #1a6a3a; }
  .badge-reservado { background: #fde8d0; color: #a04010; }

const _loadedModules = {};

async function ensureModule(name) {
  if (_loadedModules[name]) return;
  _loadedModules[name] = true;
  const container = document.getElementById(name + '-module');
  container.innerHTML = `<div class="module-loading"><span class="loading-dots">Cargando</span></div>`;
  try {
    const res = await fetch(name + '.html');
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    const html = await res.text();
    const parser = new DOMParser();
    const doc = parser.parseFromString(html, 'text/html');
    const scripts = [...doc.querySelectorAll('script')];
    scripts.forEach(s => s.remove());
    container.innerHTML = doc.body.innerHTML;
    for (const script of scripts) {
      const el = document.createElement('script');
      el.textContent = script.textContent;
      document.head.appendChild(el);
    }
  } catch(e) {
    _loadedModules[name] = false;
    container.innerHTML = `<div class="empty-state"><div class="icon">⚠️</div><p>Error al cargar ${name}.html<br><small>${e.message}</small></p></div>`;
    throw e;
  }
}

// =========================================================
// GITHUB API
// =========================================================
function ghHeaders() {
  return {
    'Authorization': `token ${localStorage.getItem('gh_token')}`,
    'Accept': 'application/vnd.github.v3+json',
    'Content-Type': 'application/json',
  };
}

async function ghGet(path) {
  const url = `https://api.github.com/repos/${GH_USER}/${GH_REPO}/contents/${path}`;
  const res = await fetch(url, { headers: ghHeaders() });
  if (res.status === 404) return null;
  if (!res.ok) throw new Error(`GitHub GET ${path}: ${res.status}`);
  return res.json();
}

async function ghPut(path, content, sha) {
  const url = `https://api.github.com/repos/${GH_USER}/${GH_REPO}/contents/${path}`;
  const body = {
    message: `CRM update: ${path}`,
    content: btoa(unescape(encodeURIComponent(JSON.stringify(content, null, 2)))),
    branch: GH_BRANCH,
  };
  if (sha) body.sha = sha;
  const res = await fetch(url, { method: 'PUT', headers: ghHeaders(), body: JSON.stringify(body) });
  if (!res.ok) {
    const err = await res.json().catch(() => ({}));
    throw new Error(err.message || `GitHub PUT ${path}: ${res.status}`);
  }
  return res.json();
}

async function ghDelete(path, sha) {
  const url = `https://api.github.com/repos/${GH_USER}/${GH_REPO}/contents/${path}`;
  const body = { message: `CRM delete: ${path}`, sha, branch: GH_BRANCH };
  const res = await fetch(url, { method: 'DELETE', headers: ghHeaders(), body: JSON.stringify(body) });
  if (!res.ok) throw new Error(`GitHub DELETE ${path}: ${res.status}`);
}

async function ghListDir(path) {
  const url = `https://api.github.com/repos/${GH_USER}/${GH_REPO}/contents/${path}`;
  const res = await fetch(url, { headers: ghHeaders() });
  if (res.status === 404) return [];
  if (!res.ok) throw new Error(`GitHub LIST ${path}: ${res.status}`);
  return res.json();
}

// =========================================================
// DATA LOAD / SAVE
// =========================================================
const shaCache = {};

async function loadAllData() {
  setSaveIndicator('saving', 'Cargando...');
  try {
    const [cFiles, vFiles, iFiles] = await Promise.all([
      ghListDir('data/clientes').catch(() => []),
      ghListDir('data/vehiculos').catch(() => []),
      ghListDir('data/inventario').catch(() => []),
    ]);

    const load = async (files, store) => {
      await Promise.all(files.filter(f => f.name.endsWith('.json')).map(async f => {
        try {
          const raw = await ghGet(f.path);
          if (!raw) return;
          shaCache[f.path] = raw.sha;
          const data = JSON.parse(atob(raw.content.replace(/\n/g,'')));
          store[data.id] = data;
        } catch(e) { console.warn('Error loading', f.path, e); }
      }));
    };

    await Promise.all([
      load(cFiles, clientes),
      load(vFiles, vehiculos),
      load(iFiles, inventario),
    ]);

    // Local-only entries fallback merge
    for (const key of Object.keys(localStorage)) {
      if (key.startsWith('cliente_') && !clientes[key.slice(8)]) {
        const d = localGet(key.slice(8)); if (d) clientes[d.id] = d;
      }
      if (key.startsWith('vehiculo_') && !vehiculos[key.slice(9)]) {
        const d = localGet('veh_'+key.slice(9)); if (d) vehiculos[d.id] = d;
      }
      if (key.startsWith('inventario_')) {
        const d = localGet(key); if (d && d.id && !inventario[d.id]) inventario[d.id] = d;
      }
    }

    setSaveIndicator('saved', 'Datos cargados ✓');
  } catch(e) {
    console.error(e);
    setSaveIndicator('error', 'Error al cargar');
    toast('Error al cargar datos de GitHub. Usando datos locales.', 'error');
    loadLocalFallback();
  }
}

function loadLocalFallback() {
  for (const key of Object.keys(localStorage)) {
    if (key.startsWith('cliente_')) { const d = localGet(key.slice(8)); if (d) clientes[d.id] = d; }
    if (key.startsWith('vehiculo_')) { const d = localGet('veh_'+key.slice(9)); if (d) vehiculos[d.id] = d; }
    if (key.startsWith('inventario_')) { const d = localGet(key); if (d && d.id) inventario[d.id] = d; }
  }
}

async function saveCliente(id) {
  const c = clientes[id];
  if (!c) return;
  c.fecha_ultima_interaccion = new Date().toISOString();
  const path = `data/clientes/${id}.json`;
  localSet('cliente_'+id, c);
  setSaveIndicator('saving', 'Guardando...');
  try {
    const existing = await ghGet(path);
    await ghPut(path, c, existing?.sha);
    shaCache[path] = (await ghGet(path))?.sha;
    setSaveIndicator('saved', 'Guardado ✓');
  } catch(e) {
    console.warn('GitHub save failed, stored locally', e);
    setSaveIndicator('error', '⚠ Solo local');
    toast('No se pudo guardar en GitHub. Guardado en local.', 'warning');
  }
}

async function saveVehiculo(id) {

    const existing = await ghGet(path);

    shaCache[path] = (await ghGet(path))?.sha;

  } catch(e) {

    setSaveIndicator('error', '⚠ Solo local');
    toast('No se pudo guardar en GitHub. Guardado en local.', 'warning');
  }
}

async function saveInventarioItem(id) {

  if (!item) return;

    setSaveIndicator('error', '⚠ Solo local');
    toast('No se pudo guardar en GitHub. Guardado en local.', 'warning');
  }
}

function debounceSave(type, id) {
  clearTimeout(saveDebounceTimer);
  pendingSaves.add(`${type}:${id}`);
  setSaveIndicator('saving', 'Guardando...');
  saveDebounceTimer = setTimeout(async () => {
    for (const key of pendingSaves) {
      const [t, i] = key.split(':');
      if (t === 'cliente') await saveCliente(i);
      else if (t === 'vehiculo') await saveVehiculo(i);
      else if (t === 'inventario') await saveInventarioItem(i);
    }
    pendingSaves.clear();
  }, 1000);
}

// =========================================================
// LOCAL STORAGE HELPERS

function localSet(key, val) { try { localStorage.setItem(key, JSON.stringify(val)); } catch(e) {} }
function localGet(key) { try { const v = localStorage.getItem(key); return v ? JSON.parse(v) : null; } catch(e) { return null; } }

function genId() { return Date.now().toString(36) + Math.random().toString(36).slice(2,6); }

function formatDate(iso) {
  if (!iso) return '—';
  return new Date(iso).toLocaleDateString('es-ES', { day:'2-digit', month:'short', year:'numeric' });
}

function daysSince(iso) {
  if (!iso) return 999;
  return Math.floor((Date.now() - new Date(iso)) / 86400000);
}

function pipelineBadge(estado) {
  const label = PIPELINE_LABELS[estado] || estado;
  return `<span class="badge pipeline-${estado}">${label}</span>`;
}

function esc(str) {
  if (str === null || str === undefined) return '';
  return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');
}

// =========================================================
// GENERIC FIELD UPDATE (shared by CRM and Inventario)
// =========================================================
function updateField(id, type, field, value) {
  const obj = type==='cliente' ? clientes[id] : type==='inventario' ? inventario[id] : vehiculos[id];
  if (!obj) return;
  if (field.startsWith('busca_')) {
    if (!obj.busca) obj.busca = {};
    const map = { tipo_vehiculo:'tipo_vehiculo', modelos:'modelos', anyo_min:'anyo_min', anyo_max:'anyo_max', km_max:'km_max', presupuesto:'presupuesto_total', uso:'uso_previsto', preferencias:'preferencias' };
    const sub = field.slice(6);
    obj.busca[map[sub]||sub] = value;
  } else {
    obj[field] = value;
  }
  debounceSave(type, id);
}

// =========================================================
// WORDPRESS SYNC (shared by CRM and Inventario)
// =========================================================
function wpBadge(item) {
  if (!item) return '';
  return item.wp_post_id
    ? `<a href="https://mendivan.com/?p=${esc(String(item.wp_post_id))}" target="_blank" class="link-ext" style="font-size:12px">✅ Web</a>`
    : `<span style="font-size:12px;color:var(--gray-400)">⚠️ Sin publicar</span>`;
}

async function syncToWordPress(id, source) {
  const item = source==='inventario' ? inventario[id] : vehiculos[id];
  if (!item) return;
  const title = [item.marca, item.modelo, item.anio||item.anyo].filter(Boolean).join(' ');
  const body = {
    title, status: 'publish',
    meta: {
      categoria: item.categoria||'', origen: item.origen||'', estado: item.estado||'',
      km: String(item.km||''), combustible: item.combustible||'', cambio: item.cambio||'',
      potencia_cv: String(item.potencia_cv||''), color: item.color||'',
      precio_alemania: String(item.precio_alemania||''),
      precio_venta_espana: String(item.precio_venta_espana||''),
      descripcion_web: item.descripcion_web||'',
      fotos: (item.fotos||[]).join(','),
      url_mobile: item.url_mobile||item.link_mobile||'',
      notas_internas: item.notas_internas||'',
      crm_id: item.id,
    },
  };
  const isUpdate = !!item.wp_post_id;
  const endpoint = isUpdate ? `${WP_BASE}/${WP_CPT}/${item.wp_post_id}` : `${WP_BASE}/${WP_CPT}`;
  setSaveIndicator('saving', 'Sincronizando...');
  try {
    const res = await fetch(endpoint, {
      method: isUpdate ? 'PUT' : 'POST',
      headers: { 'Authorization': WP_AUTH, 'Content-Type': 'application/json' },
      body: JSON.stringify(body),
    });
    if (!res.ok) { const err = await res.json().catch(()=>({})); throw new Error(err.message||`WordPress ${res.status}`); }
    const data = await res.json();
    item.wp_post_id = data.id;
    if (source==='inventario') { await saveInventarioItem(id); if (typeof openInventarioItem==='function') openInventarioItem(id); }
    else { await saveVehiculo(id); if (typeof openVehiculo==='function') openVehiculo(id); }
    toast(`${isUpdate?'Actualizado':'Publicado'} en WordPress ✓`, 'success');
  } catch(e) {
    setSaveIndicator('error', 'Error WP');
    toast(`Error WordPress: ${e.message}`, 'error');
    console.error(e);
  }
}

// =========================================================
// CONFIG MODAL
// =========================================================
function showConfig() {
  openModal(`
    <div class="modal-title">⚙️ Configuración</div>
    <div class="config-section">
      <h3>GitHub</h3>
      <div class="form-group">
        <label class="form-label">Personal Access Token</label>
        <input type="password" class="form-control" id="cfg-gh-token" value="${localStorage.getItem('gh_token')||''}">
      </div>
    </div>
    <div class="config-section">
      <h3>Anthropic IA</h3>
      <div class="form-group">
        <label class="form-label">API Key</label>
        <input type="password" class="form-control" id="cfg-ai-key" value="${localStorage.getItem('ai_key')||''}">
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-ghost" onclick="closeModal()">Cancelar</button>
      <button class="btn btn-primary" onclick="guardarConfig()">Guardar</button>
    </div>
  `);
}

function guardarConfig() {
  const token = document.getElementById('cfg-gh-token').value.trim();
  const aiKey = document.getElementById('cfg-ai-key').value.trim();
  if (token) localStorage.setItem('gh_token', token);
  if (aiKey) localStorage.setItem('ai_key', aiKey);
  closeModal();
  toast('Configuración guardada', 'success');
}

// =========================================================
// MODAL HELPERS
// =========================================================
function openModal(html, wide=false) {
  const mc = document.getElementById('modal-content');
  mc.innerHTML = html;
  mc.classList.toggle('modal-wide', wide);
  document.getElementById('modal-overlay').style.display = 'flex';
}
function closeModal() {
  document.getElementById('modal-overlay').style.display = 'none';
}
function closeModalOnOverlay(e) {
  if (e.target === document.getElementById('modal-overlay')) closeModal();
}

// =========================================================
// KEYBOARD
// =========================================================
document.addEventListener('keydown', e => {
  if (e.key === 'Escape') closeModal();
});

// =========================================================
// START
// =========================================================
init();
</script>
